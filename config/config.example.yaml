mqtt:
  broker: tcp://localhost:1883
  client_id: house-state-engine
  publish_prefix: house

# Adapters translate protocol-specific MQTT traffic into engine calls.
# The engine itself is protocol-agnostic — to add Tasmota / Shelly /
# Homie / raw-topic sensors, add an adapter block here once those
# adapters exist.
adapters:
  zigbee2mqtt:
    enabled: true
    base_topic: zigbee2mqtt
  # sweeney/boiler-sensor — publishes CH/HW relay state on
  # energy/boiler/sensor/{events,system}. Off by default; enable
  # explicitly because the publisher targets specific hardware.
  boiler:
    enabled: false
    base_topic: energy/boiler/sensor

http:
  listen: :8080

recent_log:
  path: /var/lib/house-state-engine/events.jsonl
  retention_hours: 72
  max_size_mb: 256

influx:
  enabled: false
  url: http://localhost:8086
  org: home
  bucket: house
  token_file: /etc/house-state-engine/influx-token

energy:
  divergence_warning_pct: 20
  max_integration_gap: 30m

availability:
  offline_debounce: 30s

house:
  quiet_after: 30m
  empty_after: 6h
  # Timezone used to bucket the mode dimension's night/day hours.
  # Empty (or omitted) means UTC. Set to your local tz (e.g.
  # "Europe/London", "America/Los_Angeles", or "Local") so the
  # Mode=Night / Mode=Day window matches the operator's wall clock.
  timezone: Local

device_classes:
  short_burst_power_device:
    name_hints: [kettle, toaster, microwave]
    default_thresholds:
      idle_below_w: 5
      active_above_w: 50
      active_sustained_for: 3s
      inactive_sustained_for: 10s
    energy_strategy: integration

  cycle_power_device:
    name_hints: [dishwasher, washing_machine, washer, tumble_dryer, dryer]
    default_thresholds:
      idle_below_w: 5
      active_above_w: 20
      active_sustained_for: 10s
      inactive_sustained_for: 5m
    energy_strategy: counter

  continuous_power_device:
    name_hints: [fridge, freezer, dehumidifier]
    default_thresholds:
      idle_below_w: 5
      active_above_w: 25
      compressor_above_w: 25
      active_sustained_for: 10s
      inactive_sustained_for: 30s
    energy_strategy: counter

  media_power_device:
    name_hints: [tv, television, av, amplifier, receiver, apple_tv, speakers]
    default_thresholds:
      idle_below_w: 5
      active_above_w: 20
      active_sustained_for: 10s
      inactive_sustained_for: 60s
    energy_strategy: integration

  # State-only devices: boiler relays, contact sensors, motion
  # sensors, smart switches that report state without power. The
  # sustained-for windows debounce short blips; sensors that
  # already debounce upstream (like boiler-sensor) can use 0.
  binary_state_device:
    default_thresholds:
      active_sustained_for: 0s
      inactive_sustained_for: 0s

  # intercom — Asterisk-via-MQTT phone system. Disabled by default; enable
  # on sites with an Asterisk bridge publishing to asterisk/#.
  intercom:
    enabled: false
    base_topic: asterisk

  # Measurement-only devices: climate sensors (Sonoff SNZB-02 etc.),
  # air-quality, illuminance. No cycle, no activity machine —
  # activity stays "reporting" while the device transmits. Latest
  # values (temp / humidity / battery) flow into the device record
  # and into Influx as device_environment / device_battery samples.
  sensor_device:
    name_hints: [climate, thsensor, snzb, ups]

devices:
  kitchen_dishwasher:
    ieee_address: "0x00158d0000000001"
    class: cycle_power_device
    display_name: Kitchen dishwasher
    location: kitchen

  utility_dishwasher:
    ieee_address: "0x00158d0000000002"
    class: cycle_power_device
    display_name: Utility dishwasher
    location: utility

  garage_freezer:
    ieee_address: "0x00158d0000000003"
    class: continuous_power_device
    display_name: Garage freezer
    location: garage

  # boiler-sensor devices — Scheme/Primary identify the channels
  # the adapter emits. Display name is what /state/devices shows.
  central_heating:
    scheme: boiler
    primary: ch
    class: binary_state_device
    display_name: Central heating
    location: house
  hot_water:
    scheme: boiler
    primary: hw
    class: binary_state_device
    display_name: Hot water
    location: house

  # Sonoff SNZB-02 climate sensors, one per floor. Each is its own
  # Zigbee device with an IEEE address; the legacy ieee_address
  # shorthand still works under the hood.
  ground_floor_climate:
    ieee_address: "0x00158d0000000010"
    class: sensor_device
    display_name: Ground floor climate
    location: ground_floor
  first_floor_climate:
    ieee_address: "0x00158d0000000011"
    class: sensor_device
    display_name: First floor climate
    location: first_floor
  loft_climate:
    ieee_address: "0x00158d0000000012"
    class: sensor_device
    display_name: Loft climate
    location: loft
